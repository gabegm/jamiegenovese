version: 2

updates:
  # Keep npm dependencies up to date
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    # Group all non-breaking updates into a single PR to reduce noise
    groups:
      astro:
        patterns:
          - astro
          - "@astrojs/*"
      tailwind:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
      dev-dependencies:
        dependency-type: development
    open-pull-requests-limit: 5
    labels:
      - dependencies

  # Keep GitHub Actions up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
